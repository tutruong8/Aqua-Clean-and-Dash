<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
        <title>Aqua Clean and Dash</title>
        <link rel="stylesheet" href="styles.css" />
    </head>
    <body>
        <!-- Title Screen -->
        <div id="title-screen" class="screen active">
            <img src="img/logo.png" id="logo" alt="gameLogo" />
            <p id="difficulty-label">Select a difficulty</p>
            <div id="difficulty-buttons">
                <button class="btn btn-easy"   id="play-easy-btn">Easy</button>
                <button class="btn btn-medium" id="play-medium-btn">Medium</button>
                <button class="btn btn-hard"   id="play-hard-btn">Hard</button>
            </div>

        </div>

        <!-- Game Screen -->
        <div id="game-screen" class="screen">
            <div id="hud">
                <span id="score-display">Score: 0</span>
                <span id="timer-display">Time: 1:30</span>
                <span id="lives-display"
                    >Lives: &#9829;&#9829;&#9829;&#9829;&#9829;</span
                >
            </div>

            <div id="arena">
                <div id="player"></div>
            </div>

            <!-- A message that initially shows controls, but updates during gameplay depending on points collected -->
            <p id="message">Use WASD, Arrow Keys, or joystick on mobile devices to move</p>

            <!-- action buttons -->
            <div id="controls">
                <!--Thumbstick is mobile only-->
                <div id="joystick-area">
                    <div id="joystick-base">
                        <div id="joystick-knob"></div>
                    </div>
                    <span class="ctrl-label">Move</span>
                </div>

                <div id="point-info">
                    <p>Collect Water: 10 pts</p>
                    <p>Clean Polluted: 20 pts</p>
                </div>

                <div id="action-buttons">
                    <!-- Clean and Dash are placeholders until the final project -->
                    <div class="action-btn-wrap">
                        <button class="action-btn" id="clean-btn" disabled>
                            Clean
                        </button>
                        <!-- clean button coming soon -->
                        <span class="ctrl-label">Space or Tap</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Game Over -->
        <div id="gameover-screen" class="screen">
            <h2>GAME OVER!</h2>
            <p>Your Score: <span id="final-score">0</span></p>
            <button class="btn" id="play-again-btn">Play Again</button>
        </div>

        <!-- Footer (only on title and game over screen) -->
        
        <footer id="charity-footer">
          <a class="footer-link" href="https://www.charitywater.org/about" target="_blank">
              More about charity: water
          </a>
          <span class="footer-divider">|</span>
          <a class="footer-link" href="https://www.charitywater.org/take-action" target="_blank">
              Donate
          </a>
        </footer>

        <script src="script.js"></script>
    </body>
</html>
